services:
  ojpt:
    build: .
    container_name: ojpt-website
    ports:
      - "8080:80"
    restart: unless-stopped
    volumes:
      # Mount the site directory for easy updates without rebuilding
      - .:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3