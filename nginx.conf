server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/css application/javascript text/html image/svg+xml;
    gzip_min_length 256;

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|svg|woff2|woff)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Clean URLs: /over-ons/ -> over-ons.html
    location /over-ons/ {
        try_files /over-ons.html =404;
    }
    location /onze-missie/ {
        try_files /onze-missie.html =404;
    }
    location /nieuws/ {
        try_files /nieuws.html =404;
    }
    location /agenda/ {
        try_files /agenda.html =404;
    }
    location /contact/ {
        try_files /contact.html =404;
    }
    location /demonstratie-ojpt-22-november-2025/ {
        try_files /demonstratie.html =404;
    }
    location /persbericht/ {
        try_files /persbericht.html =404;
    }
    location /1148-2/ {
        try_files /persbericht.html =404;
    }
    location /doneren/ {
        try_files /doneren.html =404;
    }

    # Default location
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}